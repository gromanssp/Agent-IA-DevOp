<header class="navbar">
  <div class="navbar-left">
    <button class="hamburger-btn" (click)="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="navbar-title">Agente IA DevOps</span>
  </div>
  <div class="navbar-actions">
    <span class="navbar-badge">Hackathon CubePath 2026</span>
    <button
      class="webhook-toggle"
      [class.test-mode]="webhookMode.isTestMode()"
      (click)="webhookMode.toggle()"
      [title]="webhookMode.isTestMode() ? 'Modo TEST — click para cambiar a PROD' : 'Modo PROD — click para cambiar a TEST'"
    >
      <span class="toggle-dot"></span>
      {{ webhookMode.isTestMode() ? 'TEST' : 'PROD' }}
    </button>
    @if (user(); as u) {
      <div class="user-menu-wrapper">
        <button class="user-trigger" (click)="toggleUserMenu()">
          @if (u.photoURL) {
            <img [src]="u.photoURL" [alt]="u.displayName" class="user-avatar" referrerpolicy="no-referrer">
          } @else {
            <div class="user-avatar-placeholder">{{ u.displayName.charAt(0).toUpperCase() }}</div>
          }
          <span class="user-name">{{ u.displayName }}</span>
          <svg class="chevron" [class.open]="showUserMenu()" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        @if (showUserMenu()) {
          <div class="user-menu" (click)="$event.stopPropagation()">
            <!-- <a class="user-menu-item" routerLink="/settings" (click)="showUserMenu.set(false)">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Settings
            </a>
            <div class="menu-divider"></div> -->
            <button class="user-menu-item user-menu-item--danger" (click)="logout()">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Cerrar sesion
            </button>
          </div>
        }
      </div>
    }
  </div>
</header>
