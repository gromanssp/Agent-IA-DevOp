<header class="navbar">
  <div class="navbar-left">
    <button class="hamburger-btn" (click)="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="navbar-title">Agente IA DevOps</span>
  </div>
  <div class="navbar-actions">
    <span class="navbar-badge">Hackathon CubePath 2026</span>
    @if (user(); as u) {
      <div class="user-info">
        @if (u.photoURL) {
          <img [src]="u.photoURL" [alt]="u.displayName" class="user-avatar" referrerpolicy="no-referrer">
        } @else {
          <div class="user-avatar-placeholder">{{ u.displayName.charAt(0).toUpperCase() }}</div>
        }
        <span class="user-name">{{ u.displayName }}</span>
      </div>
      <button class="logout-btn" (click)="logout()" title="Cerrar sesion">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    }
  </div>
</header>
