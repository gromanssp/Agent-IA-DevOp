<aside class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-header">
    <span class="sidebar-logo heading-3">Agent<span class="text-gradient">IA</span></span>
    <button class="toggle-btn" (click)="toggle()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>
  </div>
  <nav class="sidebar-nav">
    <a routerLink="/chat" routerLinkActive="active" class="nav-item" title="DevOps Chat">
      <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="nav-label">DevOps Chat</span>
    </a>
  </nav>

  <div class="sidebar-section-title">
    <span class="nav-label">Operaciones</span>
  </div>
  <div class="sidebar-suggestions">
    @for (s of suggestions; track s.label) {
      <button class="suggestion-btn" [title]="s.text" (click)="useSuggestion(s.text)">
        <svg class="suggestion-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path [attr.d]="s.svgPath" />
        </svg>
        <span class="nav-label">{{ s.label }}</span>
      </button>
    }
  </div>
</aside>
